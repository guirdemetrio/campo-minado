name: CD

on:
   workflow_run:
    workflows: ["Build"]   
    types:
      - completed
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: ./campo-minado/campo-minado

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package 

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: campo-minado/campo-minado/target/campo-minado-0.0.1-SNAPSHOT.jar
