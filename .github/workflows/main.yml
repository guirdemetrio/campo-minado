name: Continuous Delivery

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./campo-minado

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: campo-minado-jar
          path: campo-minado/target/campo-minado-0.0.1-SNAPSHOT.jar
      
      - name: Build Docker image
        run: docker build -t campo-minado .
        working-directory: ${{ github.workspace }}

      - name: Run Docker container
        run: docker run --rm campo-minado
        working-directory: ${{ github.workspace }}

  deploy:
    runs-on: ubuntu-latest
    needs: build    

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: campo-minado-jar

      - name: Run
        run: java -jar campo-minado-0.0.1-SNAPSHOT.jar

    
        
